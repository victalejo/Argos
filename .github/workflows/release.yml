name: Release DMG

# Compila Argos (Release) y empaqueta un .dmg instalable.
#   - Ejecución manual (workflow_dispatch): el DMG queda como artifact de la corrida.
#   - Push de un tag v* (p. ej. v1.0.2): además publica un GitHub Release con el DMG
#     adjunto y notas generadas automáticamente desde los Conventional Commits.
#
# Firma AD-HOC ("-"): la app corre en tu propia Mac sin cuenta Apple Developer.
# NO está notarizada, así que tras descargar hay que quitar la cuarentena de Gatekeeper
# (ver el cuerpo del release). Para distribuir a terceros sin avisos haría falta
# firma con Developer ID + notarización.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # necesario para crear el Release en push de tag

jobs:
  build-dmg:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          # Historia + tags completos: las notas del release usan `git log` entre
          # el tag anterior y el actual, y `git describe` para hallar el anterior.
          fetch-depth: 0

      - name: Seleccionar Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Instalar XcodeGen y xcbeautify
        run: brew install xcodegen xcbeautify

      # project.yml es la fuente de verdad: regeneramos antes de compilar.
      - name: Generar proyecto (XcodeGen)
        run: xcodegen generate

      - name: Resolver dependencias SPM
        run: xcodebuild -resolvePackageDependencies -project Argos.xcodeproj -scheme Argos

      # Gate: no publicar un release con tests en rojo. Corre la suite antes de compilar
      # el Release (en Debug, sin firma) y aborta el workflow si falla algún test.
      - name: Test (gate del release)
        run: |
          xcodebuild test \
            -project Argos.xcodeproj -scheme Argos -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO | xcbeautify || exit ${PIPESTATUS[0]}

      # Build Release con firma ad-hoc ("-"). Style=Manual evita que el firmado
      # automático intente contactar a Apple (no hay equipo de desarrollo en CI).
      - name: Build (Release, ad-hoc)
        run: |
          xcodebuild build \
            -project Argos.xcodeproj -scheme Argos -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/dd \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            | xcbeautify || exit ${PIPESTATUS[0]}

      # Guard: en push de tag, la versión del binario (CFBundleShortVersionString, que
      # sale de MARKETING_VERSION en project.yml) DEBE coincidir con el tag. Si no, se
      # olvidó bumpear la versión: Sparkle no ofrecería la actualización a los usuarios.
      - name: Verificar versión binario == tag
        if: github.ref_type == 'tag'
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          APP="build/dd/Build/Products/Release/Argos.app"
          SHORT="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP/Contents/Info.plist")"
          EXPECTED="${TAG_NAME#v}"
          if [ "$SHORT" != "$EXPECTED" ]; then
            echo "::error::La versión del binario ($SHORT) no coincide con el tag ($EXPECTED). Actualiza MARKETING_VERSION en project.yml y regenera antes de etiquetar."
            exit 1
          fi
          echo "Versión OK: binario $SHORT coincide con el tag $EXPECTED"

      # Empaqueta con hdiutil (sin Finder/AppleScript → fiable en runner headless).
      # La versión sale del tag (v1.0.2 → 1.0.2); en corridas manuales, del Info.plist.
      - name: Empaquetar DMG
        run: |
          set -euo pipefail
          APP="build/dd/Build/Products/Release/Argos.app"
          test -d "$APP" || { echo "::error::No se encontró $APP"; exit 1; }

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP/Contents/Info.plist" 2>/dev/null || echo 0.0)"
          fi
          echo "DMG_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "DMG_NAME=Argos-${VERSION}.dmg" >> "$GITHUB_ENV"

          STAGE="build/dmg-stage"
          rm -rf "$STAGE" && mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "Argos" \
            -srcfolder "$STAGE" \
            -fs HFS+ \
            -format UDZO \
            -ov \
            "Argos-${VERSION}.dmg"
          # Verifica que el DMG sea montable/íntegro antes de publicarlo.
          hdiutil verify "Argos-${VERSION}.dmg"
          ls -lh Argos-*.dmg

      # ZIP que consume Sparkle para las actualizaciones OTA. Debe contener Argos.app en
      # la raíz: `ditto --keepParent` lo garantiza. También captura el build (CFBundleVersion),
      # que es lo que Sparkle compara (sparkle:version) para decidir si hay actualización.
      - name: Empaquetar ZIP (Sparkle)
        run: |
          set -euo pipefail
          APP="build/dd/Build/Products/Release/Argos.app"
          BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP/Contents/Info.plist")"
          echo "APP_BUILD=$BUILD" >> "$GITHUB_ENV"
          echo "ZIP_NAME=Argos-${DMG_VERSION}.zip" >> "$GITHUB_ENV"
          ditto -c -k --keepParent "$APP" "Argos-${DMG_VERSION}.zip"
          ls -lh Argos-*.zip

      # El DMG queda disponible como artifact en TODA corrida (incluida la manual).
      - name: Subir DMG como artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DMG_NAME }}
          path: ${{ env.DMG_NAME }}
          if-no-files-found: error

      # Genera el cuerpo del release agrupando los Conventional Commits desde el tag
      # anterior. Solo en push de tag.
      - name: Generar notas del release
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          if [[ -n "$PREV" ]]; then
            RANGE="${PREV}..${TAG}"
          else
            RANGE="${TAG}"
          fi

          tmp="$(mktemp -d)"
          # Clasifica cada commit por su tipo Conventional en archivos por categoría.
          # `tformat:` termina CADA línea con newline (incluida la última) para que el
          # `while read` no descarte el último commit (git `format:` no pone newline final).
          git log --no-merges --pretty=tformat:'%s' "$RANGE" | while IFS= read -r subject; do
            type="$(printf '%s' "$subject" | sed -nE 's/^([a-zA-Z]+)(\([^)]*\))?!?:.*/\1/p' | tr '[:upper:]' '[:lower:]')"
            case "$type" in
              feat) cat="feat" ;;
              fix) cat="fix" ;;
              perf) cat="perf" ;;
              refactor) cat="refactor" ;;
              docs) cat="docs" ;;
              build|ci|chore|test) cat="chore" ;;
              *) cat="other" ;;
            esac
            if [[ "$cat" != "other" ]]; then
              desc="$(printf '%s' "$subject" | sed -E 's/^[a-zA-Z]+(\([^)]*\))?!?:[[:space:]]*//')"
            else
              desc="$subject"
            fi
            printf -- '- %s\n' "$desc" >> "$tmp/$cat"
          done

          section() { # $1=archivo $2=título
            if [[ -s "$tmp/$1" ]]; then
              printf '### %s\n\n' "$2"
              cat "$tmp/$1"
              printf '\n'
            fi
          }

          {
            echo "Build ad-hoc para uso personal (sin notarizar)."
            echo
            echo "**Instalación:** abre el \`.dmg\` y arrastra Argos a Applications."
            echo "En la primera ejecución (Gatekeeper bloquea apps sin notarizar):"
            echo
            echo '```sh'
            echo "xattr -dr com.apple.quarantine /Applications/Argos.app"
            echo '```'
            echo
            echo "o clic derecho sobre la app → **Abrir**."
            echo
            echo "## Cambios"
            echo
            section feat "✨ Funcionalidades"
            section fix "🐛 Correcciones"
            section perf "⚡ Rendimiento"
            section refactor "♻️ Refactor"
            section docs "📝 Documentación"
            section chore "🔧 Mantenimiento"
            section other "📦 Otros"
            if [[ -n "$PREV" ]]; then
              echo "**Comparar:** ${PREV}...${TAG}"
            fi
          } > notes.md

          echo "----- notes.md -----"
          cat notes.md

      # Firma el ZIP con la clave EdDSA (desde el secret) y genera el appcast.xml que
      # leerá Sparkle. La clave privada NUNCA se imprime ni se escribe a disco.
      - name: Firmar update y generar appcast (Sparkle)
        if: github.ref_type == 'tag'
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/2.9.3/Sparkle-2.9.3.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle && tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          SIGN="/tmp/sparkle/bin/sign_update"

          # Devuelve: sparkle:edSignature="..." length="...". La clave llega por stdin.
          SIG_LINE="$(echo "$SPARKLE_ED_PRIVATE_KEY" | "$SIGN" --ed-key-file - "$ZIP_NAME")"

          ZIP_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${ZIP_NAME}"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          PUBDATE="$(date -u '+%a, %d %b %Y %H:%M:%S +0000')"

          {
            echo '<?xml version="1.0" encoding="utf-8"?>'
            echo '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">'
            echo '  <channel>'
            echo '    <title>Argos</title>'
            echo '    <item>'
            echo "      <title>${GITHUB_REF_NAME}</title>"
            echo "      <link>${RELEASE_URL}</link>"
            echo "      <sparkle:releaseNotesLink>${RELEASE_URL}</sparkle:releaseNotesLink>"
            echo "      <sparkle:version>${APP_BUILD}</sparkle:version>"
            echo "      <sparkle:shortVersionString>${DMG_VERSION}</sparkle:shortVersionString>"
            echo "      <sparkle:minimumSystemVersion>15.0</sparkle:minimumSystemVersion>"
            echo "      <pubDate>${PUBDATE}</pubDate>"
            echo "      <enclosure url=\"${ZIP_URL}\" ${SIG_LINE} type=\"application/octet-stream\" />"
            echo '    </item>'
            echo '  </channel>'
            echo '</rss>'
          } > appcast.xml
          echo "----- appcast.xml -----"; cat appcast.xml

      # Publica el GitHub Release con el DMG (instalación inicial), el ZIP y el appcast
      # (actualizaciones OTA vía Sparkle). Solo en push de tag.
      - name: Publicar GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Idempotente: si el Release del tag ya existe (re-tag o "Re-run job"),
          # actualiza notas y re-sube los assets en vez de fallar.
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "Argos ${GITHUB_REF_NAME}" \
              --notes-file notes.md
            gh release upload "${GITHUB_REF_NAME}" "${DMG_NAME}" "${ZIP_NAME}" appcast.xml --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${DMG_NAME}" "${ZIP_NAME}" appcast.xml \
              --title "Argos ${GITHUB_REF_NAME}" \
              --notes-file notes.md
          fi
