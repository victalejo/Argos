name: Argos

# ─────────────────────────────────────────────────────────────────────────────
# project.yml es la ÚNICA FUENTE DE VERDAD del proyecto.
# El .xcodeproj se genera con `xcodegen generate` y se versiona como artefacto.
# Tras editar este archivo: ejecuta `xcodegen generate`. La CI verifica que no
# haya drift (genera y falla si el .pbxproj resultante difiere del commiteado).
# ─────────────────────────────────────────────────────────────────────────────

options:
  bundleIdPrefix: com.iaportafolio
  deploymentTarget:
    # El terminal en vivo usa Citadel.withPTY / TTYOutput, marcados
    # @available(macOS 15.0, *). Mínimo: macOS 15.
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

# --- Swift Package Manager dependencies ---------------------------------------
packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    # Pin estricto a minor: Citadel es <1.0; un salto de minor puede romper la API
    # de PTY/SSH que usamos. upToNextMinor evita actualizaciones incompatibles.
    minorVersion: 0.12.0
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    minorVersion: 1.13.0
  Sparkle:
    # Framework de auto-actualización (OTA). Firma sus updates con clave EdDSA propia
    # (independiente de Apple), así que funciona con builds ad-hoc.
    url: https://github.com/sparkle-project/Sparkle
    majorVersion: 2.9.3

targets:
  Argos:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Argos
    # App Sandbox + Hardened Runtime ACTIVADOS (distribución/notarización). La clave
    # SSH se lee por security-scoped bookmark que el usuario concede al elegirla; la
    # red saliente y la lectura de archivos elegidos se conceden vía entitlements.
    entitlements:
      path: Argos/Argos.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.temporary-exception.files.home-relative-path.read-only:
          - /.ssh/
        # Sparkle (sandbox): el Installer XPC corre fuera del sandbox y se comunica con
        # la app por estos nombres mach derivados del bundle id. $(PRODUCT_BUNDLE_IDENTIFIER)
        # lo sustituye Xcode al firmar.
        com.apple.security.temporary-exception.mach-lookup.global-name:
          - $(PRODUCT_BUNDLE_IDENTIFIER)-spks
          - $(PRODUCT_BUNDLE_IDENTIFIER)-spki
        # Sparkle.framework viene firmado por su propio team; bajo Hardened Runtime con
        # firma ad-hoc (sin Team ID), Library Validation rechaza cargarlo (Team IDs
        # distintos). Esto lo permite. Aceptable en distribución ad-hoc; al notarizar con
        # Developer ID se re-firmaría el framework y podría quitarse.
        com.apple.security.cs.disable-library-validation: true
    # Info.plist explícito (XcodeGen rellena los CFBundle* por defecto y añade estas
    # claves). Necesario porque Sparkle requiere claves propias (SUFeedURL, etc.) que
    # GENERATE_INFOPLIST_FILE no permite inyectar.
    info:
      path: Argos/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: ""
        CFBundleIconName: AppIcon
        # --- Sparkle (auto-actualización) ---
        SUFeedURL: https://github.com/victalejo/Argos/releases/latest/download/appcast.xml
        SUPublicEDKey: Sud7aRbwmy3N+CGAncEQdku4gCAEY6wYOMPHCM0SAN4=
        SUEnableInstallerLauncherService: true
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_NAME: Argos
        PRODUCT_BUNDLE_IDENTIFIER: com.iaportafolio.argos
        MARKETING_VERSION: "1.0.6"
        CURRENT_PROJECT_VERSION: "7"
        GENERATE_INFOPLIST_FILE: "NO"
        ENABLE_APP_SANDBOX: "YES"
        ENABLE_HARDENED_RUNTIME: "YES"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Citadel
      - package: SwiftTerm
      - package: Sparkle

  ArgosTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: ArgosTests
    # Host-less: las pruebas NO lanzan la app (evita que ContentView intente
    # conectar por SSH en CI). @testable import Argos funciona vía testability.
    dependencies:
      - target: Argos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iaportafolio.argos.tests
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  Argos:
    build:
      targets:
        Argos: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - ArgosTests
    profile:
      config: Release
    archive:
      config: Release
